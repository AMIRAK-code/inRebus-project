<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>inRebus Edu ? AI Career Intelligence</title>
  <meta name="description"
    content="AI-powered career intelligence platform. Discover your skill gaps and get a personalized learning path to land your dream role.">

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap">
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- GSAP + Plugins -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');


    :root {
      --primary: #f97316;
      --primary-dark: #ea580c;
      --primary-glow: rgba(249, 115, 22, 0.4);
      --primary-subtle: rgba(249, 115, 22, 0.08);
      --accent: #fb923c;

      --bg-base: #09090b;
      --bg-surface: #111113;
      --bg-card: #18181b;
      --bg-card-hover: #1e1e24;
      --bg-elevated: #232329;

      --border: rgba(255, 255, 255, 0.07);
      --border-hover: rgba(249, 115, 22, 0.4);
      --border-subtle: rgba(255, 255, 255, 0.04);

      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #52525b;
      --text-orange: #f97316;

      --sidebar-w: 240px;
      --header-h: 56px;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-2xl: 24px;

      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.6);
      --shadow-glow: 0 0 30px rgba(249, 115, 22, 0.15);
      --shadow-glow-strong: 0 0 50px rgba(249, 115, 22, 0.25);
    }


    [data-theme="light"] {
      --primary: #f16421;
      --primary-dark: #d4500f;
      --primary-glow: rgba(241, 100, 33, 0.35);
      --primary-subtle: rgba(241, 100, 33, 0.1);
      --accent: #fb923c;

      --bg-base: #f8fafc;
      --bg-surface: #f1f5f9;
      --bg-card: #ffffff;
      --bg-card-hover: #f8fafc;
      --bg-elevated: #e2e8f0;

      --border: rgba(0, 0, 0, 0.08);
      --border-hover: rgba(241, 100, 33, 0.5);
      --border-subtle: rgba(0, 0, 0, 0.04);

      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --text-orange: #d4500f;

      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.07);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.09);
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.12);
      --shadow-glow: 0 0 30px rgba(241, 100, 33, 0.1);
      --shadow-glow-strong: 0 0 50px rgba(241, 100, 33, 0.2);
    }


    body,
    .sidebar,
    .top-header,
    .content-area,
    .hero-card,
    .stat-card,
    .rec-card,
    .skill-card,
    .search-input,
    .role-chip,
    .nav-btn,
    .user-pill {
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    }


    [data-theme="light"] body {
      background: var(--bg-base);
    }

    [data-theme="light"] .sidebar {
      background: rgba(248, 250, 252, 0.92);
      border-right-color: rgba(0, 0, 0, 0.08);
    }

    [data-theme="light"] .top-header {
      background: rgba(248, 250, 252, 0.9);
      border-bottom-color: rgba(0, 0, 0, 0.08);
    }

    [data-theme="light"] .nav-btn.active {
      background: rgba(241, 100, 33, 0.1);
      border-color: rgba(241, 100, 33, 0.2);
    }

    [data-theme="light"] .hero-card {
      background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
      box-shadow: var(--shadow-md);
    }

    [data-theme="light"] .search-input {
      background: #ffffff;
      border-color: rgba(0, 0, 0, 0.1);
      color: var(--text-primary);
    }

    [data-theme="light"] .search-input::placeholder {
      color: #94a3b8;
    }

    [data-theme="light"] .role-chip {
      background: #ffffff;
      border-color: rgba(0, 0, 0, 0.1);
      color: #475569;
    }

    [data-theme="light"] .role-chip:hover,
    [data-theme="light"] .role-chip.selected {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    [data-theme="light"] #particle-canvas {
      opacity: 0.15;
    }

    /* -- Theme toggle pill button -- */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      height: 34px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.25s ease;
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .theme-toggle:hover {
      border-color: rgba(241, 100, 33, 0.5);
      color: var(--primary);
      background: var(--primary-subtle);
      transform: translateY(-1px);
      box-shadow: 0 3px 12px var(--primary-glow);
    }

    .theme-toggle svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    [data-theme="light"] .theme-toggle svg {
      transform: rotate(360deg);
    }

    /* Light mode dashboard card improvements */
    [data-theme="light"] .stat-card {
      background: #ffffff;
      border-color: rgba(0, 0, 0, 0.08);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    [data-theme="light"] .skill-card {
      background: #ffffff;
      border-color: rgba(0, 0, 0, 0.08);
    }

    [data-theme="light"] .rec-card {
      background: #ffffff;
      border-color: rgba(0, 0, 0, 0.08);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    [data-theme="light"] .section-header-row,
    [data-theme="light"] .section-title {
      color: #0f172a;
    }

    [data-theme="light"] .hero-card-role {
      color: #0f172a;
    }

    [data-theme="light"] .hero-card-subtitle {
      color: #475569;
    }

    [data-theme="light"] .stat-label {
      color: #475569;
    }

    [data-theme="light"] .stat-value {
      color: #0f172a;
    }

    [data-theme="light"] .nav-btn {
      color: #475569;
    }

    [data-theme="light"] .nav-btn:hover {
      color: #0f172a;
      background: rgba(0, 0, 0, 0.04);
    }

    [data-theme="light"] .nav-btn .nav-icon {
      background: #e2e8f0;
    }

    [data-theme="light"] .nav-section-label {
      color: #94a3b8;
    }

    [data-theme="light"] .user-name {
      color: #0f172a;
    }

    [data-theme="light"] .user-label {
      color: #64748b;
    }

    [data-theme="light"] .logo-wordmark {
      color: #0f172a;
    }

    [data-theme="light"] .rec-card-title {
      color: #0f172a;
    }

    [data-theme="light"] .rec-card-skill {
      color: #64748b;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #particle-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .sidebar {
      width: var(--sidebar-w);
      background: rgba(17, 17, 19, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .sidebar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0.5;
    }

    .sidebar-header {
      padding: 1.125rem 1.125rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0px;
      cursor: pointer;
      user-select: none;
    }

    /* Orange square with 'in' ? matches inRebus.it exactly */
    .logo-mark {
      width: 36px;
      height: 36px;
      background: #f16421;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      color: white;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }

    /* 'Rebus' wordmark ? plain white, matches site */
    .logo-wordmark {
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      padding-left: 6px;
    }

    .logo-tag {
      font-size: 9px;
      font-weight: 700;
      color: var(--primary);
      margin-left: 6px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border: 1px solid rgba(249, 115, 22, 0.5);
      border-radius: 3px;
      padding: 1px 5px;
      line-height: 1.6;
      align-self: center;
    }

    /* Keep these in case anything references them */
    .logo-text {
      display: none;
    }

    .logo-thin {
      display: none;
    }

    .logo-bold {
      display: none;
    }


    .sidebar-nav {
      flex: 1;
      padding: 0.875rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      overflow-y: auto;
    }

    .nav-section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      padding: 0.875rem 0.75rem 0.5rem;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.75rem;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      width: 100%;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .nav-btn .nav-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.04);
      border-color: var(--border);
    }

    .nav-btn:hover .nav-icon {
      background: rgba(249, 115, 22, 0.15);
    }

    .nav-btn.active {
      color: var(--primary);
      background: var(--primary-subtle);
      border-color: rgba(249, 115, 22, 0.2);
      font-weight: 600;
    }

    .nav-btn.active .nav-icon {
      background: rgba(249, 115, 22, 0.2);
      color: var(--primary);
    }

    .nav-btn::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 0;
      background: var(--primary);
      border-radius: 0 3px 3px 0;
      transition: height 0.2s ease;
    }

    .nav-btn.active::after {
      height: 60%;
    }

    .sidebar-footer {
      padding: 0.875rem 0.75rem;
      border-top: 1px solid var(--border);
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.625rem;
      border-radius: var(--radius-md);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .user-pill:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--primary), #c2410c);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .user-info {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-label {
      font-size: 0.6875rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ===== MAIN WRAPPER ===== */
    .main-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ===== TOP HEADER ===== */
    .top-header {
      height: var(--header-h);
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      position: relative;
      z-index: 5;
      flex-shrink: 0;
      gap: 1rem;
    }

    .top-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    #header-action-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* ===== CONTENT AREA ===== */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--bg-elevated) transparent;
    }

    .content-area::-webkit-scrollbar {
      width: 5px;
    }

    .content-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .content-area::-webkit-scrollbar-thumb {
      background: var(--bg-elevated);
      border-radius: 10px;
    }

    /* ===== CARDS ===== */
    .card {
      background: rgba(24, 24, 27, 0.8);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      box-shadow: var(--shadow-md);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
      box-shadow: var(--shadow-lg);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), transparent);
      pointer-events: none;
    }

    /* ===== BUTTONS ===== */
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 0.65rem 1.25rem;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 0.875rem;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 0 20px var(--primary-glow);
      position: relative;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.01em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px var(--primary-glow), 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%) skewX(-15deg); }
      100% { transform: translateX(200%) skewX(-15deg); }
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.4), transparent);
      transform: translateX(-100%) skewX(-15deg);
      animation: shimmer 3s infinite;
      pointer-events: none;
    }

    /* ===== DNA SCAN ===== */
    .scanning-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: #f16421;
      box-shadow: 0 0 20px #f16421;
      z-index: 10;
      pointer-events: none;
    }

    .btn-primary:hover::before {
      opacity: 1;
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      padding: 0.45rem 0.875rem;
      border-radius: var(--radius-md);
      font-weight: 500;
      font-size: 0.75rem;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-ghost:hover {
      color: var(--text-primary);
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.04);
    }

    /* ===== ROLE SELECTION VIEW ===== */
    .role-selection-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 64px);
      padding: 2rem;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.75rem;
      background: var(--primary-subtle);
      border: 1px solid rgba(249, 115, 22, 0.2);
      border-radius: 100px;
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: 0.03em;
      margin-bottom: 1.25rem;
      text-transform: uppercase;
    }

    .hero-badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.7);
      }
    }

    .hero-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.75rem, 3.5vw, 2.5rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.025em;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .hero-title .highlight {
      background: linear-gradient(135deg, var(--primary), #fb923c, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      max-width: 460px;
      line-height: 1.65;
      margin-bottom: 1.75rem;
    }

    .search-form {
      display: flex;
      gap: 0.625rem;
      width: 100%;
      max-width: 520px;
      margin-bottom: 1.75rem;
    }

    .search-input-wrapper {
      flex: 1;
      position: relative;
    }

    .search-input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.65rem 0.875rem 0.65rem 2.5rem;
      color: var(--text-primary);
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.25s ease;
      outline: none;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      border-color: rgba(249, 115, 22, 0.5);
      background: var(--bg-card-hover);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
    }

    .popular-roles {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      max-width: 500px;
    }

    .popular-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      width: 100%;
      margin-bottom: 0.2rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .role-chip {
      padding: 0.35rem 0.875rem;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 0.8125rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    .role-chip:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-subtle);
    }

    /* ===== STATS ROW ===== */
    .stats-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .stat-card {
      flex: 1;
      min-width: 110px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      background: rgba(24, 24, 27, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .stat-card:hover {
      border-color: rgba(249, 115, 22, 0.3);
      box-shadow: var(--shadow-glow);
      transform: translateY(-2px);
    }

    .stat-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.2rem;
    }

    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .stat-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ===== HERO CARD (Dashboard) ===== */
    .hero-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, #1a1a22 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .hero-card::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-card-role {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.2rem;
      letter-spacing: -0.02em;
    }

    .hero-card-subtitle {
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    /* ===== CIRCULAR PROGRESS ===== */
    .circular-progress {
      position: relative;
      width: 90px;
      height: 90px;
      flex-shrink: 0;
    }

    .circular-progress svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .circular-progress .track {
      fill: none;
      stroke: var(--bg-elevated);
      stroke-width: 6;
    }

    .circular-progress .fill {
      fill: none;
      stroke: url(#progress-gradient);
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.5s ease;
    }

    .circular-progress .label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .circular-progress .percent {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }

    .circular-progress .percent-label {
      font-size: 0.6rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    /* ===== GRID ===== */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.875rem;
      margin-bottom: 0.875rem;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.875rem;
    }

    /* ===== SKILL TAGS ===== */
    .skill-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.35rem 0.75rem;
      border-radius: 100px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: default;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .skill-tag.green {
      background: rgba(34, 197, 94, 0.1);
      color: #86efac;
      border-color: rgba(34, 197, 94, 0.2);
    }

    .skill-tag.orange {
      background: rgba(249, 115, 22, 0.1);
      color: #fdba74;
      border-color: rgba(249, 115, 22, 0.2);
    }

    .skill-tag.blue {
      background: rgba(99, 102, 241, 0.1);
      color: #a5b4fc;
      border-color: rgba(99, 102, 241, 0.2);
    }

    .skill-tag:hover {
      transform: scale(1.05);
    }

    /* ===== PROGRESS BAR ===== */
    .progress-bar-wrapper {
      margin-bottom: 1rem;
    }

    .progress-bar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .progress-bar-label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .progress-bar-value {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--primary);
    }

    .progress-bar-track {
      height: 6px;
      background: var(--bg-elevated);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-dark), var(--accent));
      border-radius: 100px;
      transform-origin: left;
      transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ===== RECOMMENDATION CARD ===== */
    .rec-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
    }

    .rec-card:hover {
      border-color: rgba(249, 115, 22, 0.3);
      transform: translateY(-4px);
      box-shadow: var(--shadow-glow), var(--shadow-lg);
    }

    .rec-card-image {
      height: 120px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
    }

    .rec-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.5;
      transition: all 0.5s ease;
    }

    .rec-card:hover .rec-card-image img {
      opacity: 0.75;
      transform: scale(1.05);
    }

    .rec-card-badge {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      padding: 0.2rem 0.5rem;
      border-radius: 100px;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(249, 115, 22, 0.9);
      color: white;
      backdrop-filter: blur(10px);
    }

    .rec-card-body {
      padding: 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .rec-card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
      letter-spacing: -0.01em;
    }

    .rec-card-skill {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.875rem;
      flex: 1;
    }

    .rec-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .rec-card-cta {
      font-size: 0.6875rem;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: gap 0.2s ease;
    }

    .rec-card:hover .rec-card-cta {
      gap: 0.6rem;
    }

    /* ===== SECTION HEADER ===== */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.875rem;
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 6px var(--primary-glow);
      flex-shrink: 0;
    }

    /* ===== LOADER ===== */
    .loading-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 56px);
      gap: 1.25rem;
    }

    .loader-container {
      position: relative;
      width: 50px;
      height: 50px;
    }

    .loader-ring-outer {
      position: absolute;
      inset: 0;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loader-ring-inner {
      position: absolute;
      inset: 12px;
      border: 2px solid var(--border);
      border-bottom-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite reverse;
    }

    .loader-dot {
      position: absolute;
      inset: 21px;
      background: var(--primary);
      border-radius: 50%;
      animation: pulse-dot 1s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .loading-steps {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: center;
    }

    .loading-step {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.3s ease;
    }

    .loading-step.active {
      color: var(--primary);
    }

    .loading-step.done {
      color: #22c55e;
    }

    /* ===== SKELETON ===== */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-elevated) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: var(--radius-lg);
    }

    @keyframes skeleton-loading {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    .skeleton-card {
      height: 150px;
      width: 100%;
    }

    .skeleton-text {
      height: 16px;
      width: 60%;
      margin-bottom: 8px;
    }

    /* ===== RESET BUTTON ===== */
    .reset-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.4rem 0.8rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .reset-btn:hover {
      color: #f87171;
      border-color: rgba(248, 113, 113, 0.4);
      background: rgba(248, 113, 113, 0.05);
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-elevated);
      border-radius: 10px;
    }

    /* ===== ANIMATIONS ===== */
    .fade-in-up {
      opacity: 0;
      transform: translateY(20px);
    }

    /* ===== RESPONSIVE ===== */

    /* Hamburger toggle button (hidden on desktop) */
    .sidebar-toggle {
      display: none;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      width: 30px;
      height: 30px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    /* Overlay for sidebar on mobile */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 9;
      backdrop-filter: blur(2px);
    }

    .sidebar-overlay.active {
      display: block;
    }

    /* -- =1100px: narrower sidebar -- */
    @media (max-width: 1100px) {
      :root {
        --sidebar-w: 220px;
      }

      .content-area {
        padding: 1rem;
      }
    }

    /* -- =900px: collapse sidebar off-screen -- */
    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        left: -100%;
        top: 0;
        bottom: 0;
        z-index: 10;
        transition: left 0.3s ease;
        width: 220px;
      }

      .sidebar.open {
        left: 0;
        box-shadow: 4px 0 40px rgba(0, 0, 0, 0.6);
      }

      .sidebar-toggle {
        display: flex;
      }

      .main-wrapper {
        width: 100%;
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }

      .grid-3 {
        grid-template-columns: repeat(2, 1fr);
      }

      .hero-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .circular-progress {
        align-self: flex-end;
      }

      .search-form {
        flex-direction: column;
        gap: 0.5rem;
      }

      .search-form .btn-primary {
        width: 100%;
        justify-content: center;
        padding: 0.6rem 1rem;
      }
    }

    /* -- =600px: mobile -- */
    @media (max-width: 600px) {
      :root {
        --header-h: 52px;
      }

      .content-area {
        padding: 0.875rem;
      }

      .top-header {
        padding: 0 0.875rem;
      }

      .hero-title {
        font-size: 1.5rem;
      }

      .grid-3 {
        grid-template-columns: 1fr;
      }

      .hero-card {
        padding: 1rem;
      }

      .features-row {
        gap: 0.75rem;
      }

      .role-selection-wrapper {
        padding: 1rem;
      }

      .circular-progress {
        width: 75px;
        height: 75px;
      }
    }

    /* -- =400px: very small screens -- */
    @media (max-width: 400px) {
      html {
        font-size: 12px;
      }

      .hero-title {
        font-size: 1.15rem;
      }
    }

    /* ===== CUSTOM CURSOR ===== */
    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background 0.2s;
      mix-blend-mode: normal;
    }

    .cursor-follower {
      position: fixed;
      width: 30px;
      height: 30px;
      border: 1px solid rgba(249, 115, 22, 0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
    }

    /* ===== TOOLTIP TAG ===== */
    .card-section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.875rem;
    }

    /* ===== ONBOARDING FEATURES ===== */
    .features-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.5rem;
      opacity: 0.7;
      justify-content: center;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .feature-icon {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: var(--primary-subtle);
      border: 1px solid rgba(249, 115, 22, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ===== CV UPLOAD VIEW ===== */
    .upload-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 100px);
      padding: 2rem;
      text-align: center;
      max-width: 800px;
      margin: 0 auto;
    }

    .upload-zone {
      width: 100%;
      max-width: 500px;
      padding: 4rem 2rem;
      background: var(--bg-card);
      border: 2px dashed var(--border);
      border-radius: var(--radius-2xl);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      margin: 2rem 0;
    }

    .upload-zone:hover,
    .upload-zone.dragging {
      border-color: var(--primary);
      background: var(--primary-subtle);
      transform: translateY(-4px);
      box-shadow: var(--shadow-glow);
    }

    .upload-icon-container {
      width: 64px;
      height: 64px;
      background: var(--bg-elevated);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      color: var(--primary);
      transition: all 0.3s ease;
    }

    .upload-zone:hover .upload-icon-container {
      background: var(--primary);
      color: white;
      transform: scale(1.1) rotate(5deg);
    }

    .upload-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .upload-hint {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* ===== CAREER OPTIONS VIEW ===== */
    .options-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 2rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      width: 100%;
      margin-top: 2rem;
    }

    .option-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .option-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--primary);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .option-card:hover {
      transform: translateY(-8px);
      border-color: var(--primary-glow);
      background: var(--bg-card-hover);
      box-shadow: var(--shadow-lg), var(--shadow-glow);
    }

    .option-card:hover::before {
      opacity: 1;
    }

    .option-card.featured {
      border: 1px solid rgba(249, 115, 22, 0.4);
      background: linear-gradient(135deg, var(--bg-card) 0%, rgba(249, 115, 22, 0.05) 100%);
    }

    .option-icon {
      width: 48px;
      height: 48px;
      background: var(--bg-elevated);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
    }

    .option-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .option-description {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      line-height: 1.6;
      flex-grow: 1;
    }

    .option-cta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--primary);
      margin-top: 1rem;
    }

    .featured-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--primary);
      color: white;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 0.25rem 0.625rem;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInRight {
      from {
        transform: translateX(30px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
        opacity: 1;
      }
    }

    /* ===== ERROR VIEW ===== */
    .error-view {
      padding: 2.5rem;
      background: var(--bg-card);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-2xl);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .error-view::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: #ef4444;
    }

    /* ============================================================
   inRebus Career AI Assistant ? Floating Widget
   Scoped to #ir-assistant, supports [data-theme="light/dark"]
   ============================================================ */

    #ir-assistant {
      /* Dark defaults */
      --ir-primary: #f16421;
      --ir-primary-dk: #d4500f;
      --ir-primary-glow: rgba(241, 100, 33, 0.3);
      --ir-primary-sub: rgba(241, 100, 33, 0.12);

      --ir-bg: #18181b;
      --ir-bg-head: #111113;
      --ir-bg-bubble: #27272a;
      --ir-border: rgba(255, 255, 255, 0.08);
      --ir-border-input: rgba(255, 255, 255, 0.12);

      --ir-text: #fafafa;
      --ir-text-sub: #a1a1aa;
      --ir-text-muted: #52525b;

      --ir-user-bg: #f16421;
      --ir-user-text: #fff;
      --ir-ai-bg: #27272a;
      --ir-ai-text: #e4e4e7;
      --ir-ai-border: rgba(255, 255, 255, 0.06);

      --ir-shadow: 0 20px 60px rgba(0, 0, 0, 0.55), 0 4px 16px rgba(0, 0, 0, 0.4);
      --ir-radius: 18px;

      position: fixed !important;
      bottom: 24px !important;
      right: 24px !important;
      z-index: 9999 !important;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Light theme overrides */
    [data-theme="light"] #ir-assistant {
      --ir-bg: #ffffff;
      --ir-bg-head: #f16421;
      --ir-bg-bubble: #f1f5f9;
      --ir-border: rgba(0, 0, 0, 0.08);
      --ir-border-input: rgba(0, 0, 0, 0.1);

      --ir-text: #0f172a;
      --ir-text-sub: rgba(255, 255, 255, 0.85);
      --ir-text-muted: #94a3b8;

      --ir-ai-bg: #f1f5f9;
      --ir-ai-text: #1e293b;
      --ir-ai-border: rgba(0, 0, 0, 0.06);

      --ir-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    /* -- Launcher button ----------------------------------- */
    #ir-launcher {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--ir-primary), var(--ir-primary-dk));
      border: 2px solid rgba(255, 255, 255, 0.18);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 28px var(--ir-primary-glow), 0 4px 12px rgba(0, 0, 0, 0.3);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.3s ease,
        opacity 0.25s ease;
      position: relative;
    }

    #ir-launcher:hover {
      transform: scale(1.1) translateY(-3px);
      box-shadow: 0 14px 40px var(--ir-primary-glow), 0 6px 18px rgba(0, 0, 0, 0.35);
    }

    #ir-launcher.ir-hidden {
      transform: scale(0) !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    /* Pulsing ring around launcher */
    #ir-launcher::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid var(--ir-primary);
      animation: ir-pulse 2.8s ease-in-out infinite;
    }

    @keyframes ir-pulse {
      0% {
        transform: scale(1);
        opacity: 0.5;
      }

      100% {
        transform: scale(1.7);
        opacity: 0;
      }
    }

    .ir-launcher-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      pointer-events: none;
    }

    .ir-launcher-icon {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ir-launcher-icon svg {
      width: 20px;
      height: 20px;
      stroke: white;
    }

    .ir-launcher-label {
      font-size: 8px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* -- Chat window --------------------------------------- */
    #ir-chat-window {
      position: absolute;
      bottom: 66px;
      right: 0;
      width: 360px;
      height: 520px;
      max-height: 82vh;
      background: var(--ir-bg);
      border: 1px solid var(--ir-border);
      border-radius: var(--ir-radius);
      box-shadow: var(--ir-shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform-origin: bottom right;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1),
        opacity 0.3s ease,
        visibility 0.3s ease;
    }

    #ir-chat-window.ir-hidden {
      transform: scale(0.88) translateY(24px);
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    /* -- Header -------------------------------------------- */
    .ir-header {
      background: var(--ir-bg-head);
      border-bottom: 1px solid var(--ir-border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .ir-header-logo {
      width: 36px;
      height: 36px;
      background: #f16421;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.3px;
    }

    /* In dark mode header, the orange square logo has slight contrast */
    [data-theme="dark"] .ir-header-logo {
      box-shadow: 0 0 12px rgba(241, 100, 33, 0.4);
    }

    /* In light mode: header IS already orange, so use a white logo */
    [data-theme="light"] .ir-header-logo {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .ir-header-info {
      flex: 1;
      min-width: 0;
    }

    .ir-header-name {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--ir-text);
      letter-spacing: -0.01em;
    }

    [data-theme="light"] .ir-header-name {
      color: #fff;
    }

    .ir-header-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.6875rem;
      color: var(--ir-text-sub);
      margin-top: 1px;
    }

    .ir-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      animation: ir-blink 2s ease-in-out infinite;
    }

    @keyframes ir-blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.35;
      }
    }

    .ir-close {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--ir-text-sub);
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    [data-theme="light"] .ir-close {
      color: rgba(255, 255, 255, 0.7);
    }

    .ir-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--ir-text);
    }

    [data-theme="light"] .ir-close:hover {
      color: #fff;
    }

    .ir-close svg {
      width: 15px;
      height: 15px;
    }

    /* -- Messages area ------------------------------------- */
    #ir-messages {
      flex: 1;
      padding: 14px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.08) transparent;
    }

    [data-theme="light"] #ir-messages {
      scrollbar-color: rgba(0, 0, 0, 0.1) transparent;
    }

    #ir-messages::-webkit-scrollbar {
      width: 3px;
    }

    #ir-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    [data-theme="light"] #ir-messages::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
    }

    /* -- Bubbles ------------------------------------------- */
    .ir-bubble {
      max-width: 84%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.875rem;
      line-height: 1.55;
      word-wrap: break-word;
      white-space: pre-wrap;
      animation: ir-pop 0.25s ease forwards;
    }

    @keyframes ir-pop {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .ir-bubble.user {
      align-self: flex-end;
      background: var(--ir-user-bg);
      color: var(--ir-user-text);
      border-bottom-right-radius: 4px;
      box-shadow: 0 3px 12px var(--ir-primary-glow);
    }

    .ir-bubble.assistant {
      align-self: flex-start;
      background: var(--ir-ai-bg);
      color: var(--ir-ai-text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--ir-ai-border);
    }

    /* -- Typing indicator ---------------------------------- */
    .ir-typing {
      align-self: flex-start;
      background: var(--ir-ai-bg);
      border: 1px solid var(--ir-ai-border);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
      animation: ir-pop 0.25s ease forwards;
    }

    .ir-typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ir-primary);
      animation: ir-dots 1.2s infinite ease-in-out both;
    }

    .ir-typing span:nth-child(2) {
      animation-delay: 0.12s;
    }

    .ir-typing span:nth-child(3) {
      animation-delay: 0.24s;
    }

    @keyframes ir-dots {

      0%,
      80%,
      100% {
        transform: scale(0.5);
        opacity: 0.4;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* -- Quick chips --------------------------------------- */
    .ir-chips-wrap {
      padding: 10px 14px 2px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .ir-chip {
      background: var(--ir-primary-sub);
      border: 1px solid rgba(241, 100, 33, 0.3);
      color: var(--ir-primary);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .ir-chip:hover {
      background: var(--ir-primary);
      border-color: var(--ir-primary);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--ir-primary-glow);
    }

    /* -- Input area ---------------------------------------- */
    .ir-input-area {
      padding: 10px 12px 12px;
      border-top: 1px solid var(--ir-border);
      flex-shrink: 0;
    }

    .ir-input-row {
      display: flex;
      align-items: flex-end;
      background: var(--ir-bg-bubble);
      border: 1px solid var(--ir-border-input);
      border-radius: 12px;
      padding: 8px 8px 8px 12px;
      gap: 8px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    [data-theme="light"] .ir-input-row {
      background: #f8fafc;
    }

    .ir-input-row:focus-within {
      border-color: rgba(241, 100, 33, 0.5);
      box-shadow: 0 0 0 3px rgba(241, 100, 33, 0.1);
    }

    #ir-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 0.875rem;
      color: var(--ir-text);
      line-height: 1.5;
      min-height: 20px;
      max-height: 88px;
      overflow-y: auto;
      scrollbar-width: none;
    }

    #ir-input::placeholder {
      color: var(--ir-text-muted);
    }

    .ir-send {
      background: var(--ir-primary);
      border: none;
      border-radius: 9px;
      width: 32px;
      height: 32px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px var(--ir-primary-glow);
    }

    .ir-send:hover {
      background: var(--ir-primary-dk);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px var(--ir-primary-glow);
    }

    .ir-send:active {
      transform: scale(0.92);
    }

    .ir-send svg {
      width: 14px;
      height: 14px;
    }

    /* -- Suggested action cards ---------------------------- */
    .ir-welcome-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
    }

    .ir-action-card {
      background: var(--ir-bg-bubble);
      border: 1px solid var(--ir-border);
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      font-family: inherit;
      color: var(--ir-ai-text);
      width: 100%;
    }

    .ir-action-card:hover {
      border-color: rgba(241, 100, 33, 0.4);
      background: var(--ir-primary-sub);
      transform: translateY(-1px);
    }

    .ir-action-card-icon {
      font-size: 16px;
      margin-bottom: 4px;
      display: block;
    }

    .ir-action-card-text {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--ir-ai-text);
      line-height: 1.3;
    }

    /* -- CV Text Input -- */
    .upload-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .upload-divider::before,
    .upload-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .text-upload-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .cv-textarea {
      width: 100%;
      min-height: 120px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1rem;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      resize: vertical;
      outline: none;
      transition: all 0.25s ease;
    }

    .cv-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-subtle);
    }

    /* CV Upload UI Enhancements */
    .upload-divider {
      position: relative;
      margin: 1.5rem 0;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }

    .upload-divider::before,
    .upload-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .text-upload-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .cv-textarea {
      width: 100%;
      height: 140px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.875rem;
      resize: vertical;
      transition: all 0.2s ease;
      line-height: 1.6;
    }

    .cv-textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--bg-card);
      box-shadow: 0 0 0 3px var(--primary-subtle);
    }
    
    /* ===== LIKE BUTTON ===== */
    .like-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
      z-index: 10;
    }
    .like-btn:hover {
      background: rgba(0, 0, 0, 0.6);
      transform: scale(1.1);
    }
    .like-btn.active {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }
    [data-theme="light"] .like-btn {
      background: rgba(255, 255, 255, 0.7);
      border-color: rgba(0, 0, 0, 0.1);
      color: #0f172a;
    }
    [data-theme="light"] .like-btn:hover {
      background: rgba(255, 255, 255, 0.9);
    }
    [data-theme="light"] .like-btn.active {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }
  </style>

</head>

  <script>// Initial data structure
    const defaultState = {
      targetRole: "",
      matchPercentage: 0,
      skills: [],

    const Components = {

                    <i data-lucide="arrow-right" style="width:15px;height:15px;display:inline;margin-left:6px;vertical-align:middle;"></i>
                </button>
            </div>

            <div class="popular-roles" id="popular-roles">
                <div class="popular-label">Popular roles</div>
                ${['Mechatronics Technician', 'Industrial Automator', 'UX Designer', 'Full Stack Dev', 'Product Manager', 'AI Engineer'].map(r =>
        `<button class="role-chip" onclick="App.setRole('${r}')">${r}</button>`

            </div>

            <p style="margin-top: 2rem; font-size: 0.875rem; color: var(--text-muted);">
                Or <a href="#" onclick="App.showView('cvUpload')" style="color: var(--primary); text-decoration: none; font-weight: 600;">upload your CV</a> for a deeper analysis.
            </p>

    /* ============================================================
       ANIMATIONS.JS ? GSAP + Particle Canvas + Custom Cursor
       ============================================================ */

    // --- 1. PARTICLE CANVAS BACKGROUND --------------------------
    (function initParticles() {
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, particles = [], animId;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      class Particle {
        constructor() { this.reset(true); }
        reset(init = false) {
          this.x = Math.random() * W;
          this.y = init ? Math.random() * H : H + 10;
          this.size = Math.random() * 1.5 + 0.3;
          this.speedY = -(Math.random() * 0.4 + 0.1);
          this.speedX = (Math.random() - 0.5) * 0.15;
          this.opacity = Math.random() * 0.5 + 0.1;
          this.flicker = Math.random() * 0.01 + 0.003;
          this.phase = Math.random() * Math.PI * 2;
          this.color = Math.random() > 0.7
            ? `rgba(249, 115, 22, ${this.opacity})`
            : `rgba(255, 255, 255, ${this.opacity * 0.3})`;
        }
        update() {
          this.y += this.speedY;
          this.x += this.speedX;
          this.phase += this.flicker;
          const currentOpacity = this.opacity * (0.7 + 0.3 * Math.sin(this.phase));
          if (this.y < -10) this.reset();
          return currentOpacity;
        }
        draw(op) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          const isOrange = this.color.includes('249');
          ctx.fillStyle = isOrange
            ? `rgba(249, 115, 22, ${op})`
            : `rgba(255, 255, 255, ${op * 0.3})`;
          ctx.fill();
        }
      }

      const COUNT = 90;
      for (let i = 0; i < COUNT; i++) particles.push(new Particle());

      function draw() {
        ctx.clearRect(0, 0, W, H);

        // Draw connection lines between nearby orange particles
        const orangePs = particles.filter((p, i) => i % 3 === 0);
        for (let i = 0; i < orangePs.length; i++) {
          for (let j = i + 1; j < orangePs.length; j++) {
            const a = orangePs[i], b = orangePs[j];
            const dist = Math.hypot(a.x - b.x, a.y - b.y);
            if (dist < 140) {
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.strokeStyle = `rgba(249, 115, 22, ${0.04 * (1 - dist / 140)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }

        particles.forEach(p => {
          const op = p.update();
          p.draw(op);
        });

        animId = requestAnimationFrame(draw);
      }

      draw();
    })();


    // --- 2. CUSTOM CURSOR ----------------------------------------
    (function initCursor() {
      const cursor = document.getElementById('cursor');
      const follower = document.getElementById('cursor-follower');
      if (!cursor || !follower) return;

      let mouseX = 0, mouseY = 0;
      let followerX = 0, followerY = 0;

      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        gsap.to(cursor, { x: mouseX, y: mouseY, duration: 0.05, ease: 'none' });
      });

      function animateFollower() {
        followerX += (mouseX - followerX) * 0.1;
        followerY += (mouseY - followerY) * 0.1;
        gsap.set(follower, { x: followerX, y: followerY });
        requestAnimationFrame(animateFollower);
      }
      animateFollower();

      // Hover effects
      document.addEventListener('mouseover', (e) => {
        const el = e.target.closest('button, a, input, .role-chip, .rec-card, .nav-btn, .user-pill, .upload-zone, .option-card');
        if (el) {
          gsap.to(cursor, { scale: 2.5, background: 'transparent', border: '1px solid var(--primary)', duration: 0.2 });
          gsap.to(follower, { scale: 1.8, opacity: 0.3, duration: 0.3 });
        }
      });

      document.addEventListener('mouseout', (e) => {
        const el = e.target.closest('button, a, input, .role-chip, .rec-card, .nav-btn, .user-pill, .upload-zone, .option-card');
        if (el) {

          gsap.to(follower, { scale: 1, opacity: 1, duration: 0.3 });
        }
      });
    })();

      magneticButton(btn) {
        if (!btn) return;
        const strength = 0.3;
        btn.addEventListener('mousemove', (e) => {
          const rect = btn.getBoundingClientRect();
          const x = e.clientX - rect.left - rect.width / 2;
          const y = e.clientY - rect.top - rect.height / 2;
          gsap.to(btn, { x: x * strength, y: y * strength, duration: 0.3, ease: 'power2.out' });
        });
        btn.addEventListener('mouseleave', () => {
          gsap.to(btn, { x: 0, y: 0, duration: 0.5, ease: 'elastic.out(1, 0.5)' });
        });
      },

      /* Dashboard entrance */
      dashboardEntrance() {
        gsap.fromTo('#hero-card',
          { opacity: 0, y: 30 },
          { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' }
        );
        gsap.fromTo('#skills-card',
          { opacity: 0, x: -20 },
          { opacity: 1, x: 0, duration: 0.6, ease: 'power3.out', delay: 0.2 }
        );
        gsap.fromTo('#gaps-card',
          { opacity: 0, x: 20 },
          { opacity: 1, x: 0, duration: 0.6, ease: 'power3.out', delay: 0.2 }
        );
        gsap.fromTo('.skill-tag',
          { opacity: 0, scale: 0.8 },
          { opacity: 1, scale: 1, duration: 0.4, stagger: 0.06, delay: 0.45, ease: 'back.out(1.4)' }
        );
        gsap.fromTo('.rec-card',
          { opacity: 0, y: 25 },
          { opacity: 1, y: 0, duration: 0.5, stagger: 0.12, delay: 0.5, ease: 'power3.out' }
        );

        // Animate circular progress
        this.animateProgress(STATE.matchPercentage);
      },

      animateProgress(percentage) {
        const fill = document.getElementById('progress-fill');
        const numEl = document.getElementById('progress-number');
        if (!fill || !numEl) return;

        const r = 44;
        const circum = 2 * Math.PI * r;
        const offset = circum * (1 - percentage / 100);

        gsap.fromTo(fill,
          { strokeDashoffset: circum },
          { strokeDashoffset: offset, duration: 1.5, ease: 'power2.out', delay: 0.4 }
        );

        const obj = { val: 0 };
        gsap.to(obj, {
          val: percentage,
          duration: 1.5,
          delay: 0.4,
          ease: 'power2.out',
          onUpdate() {
            numEl.textContent = Math.round(obj.val) + '%';
          }
        });
      },

      /* Loading step animation */
      animateLoadingSteps() {
        const steps = ['step-1', 'step-2', 'step-3'];
        steps.forEach((id, i) => {
          setTimeout(() => {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.add('active');
            if (i > 0) {
              const prev = document.getElementById(steps[i - 1]);
              if (prev) { prev.classList.remove('active'); prev.classList.add('done'); }
            }
          }, i * 700);
        });
      },

      /* Sidebar nav animation */
      sidebarEntrance() {
        gsap.fromTo('.sidebar',
          { x: -20, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.7, ease: 'power3.out' }
        );
        gsap.fromTo('.nav-btn',
          { x: -15, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.4, stagger: 0.08, delay: 0.3, ease: 'power2.out' }
        );
        gsap.fromTo('.top-header',
          { y: -20, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.6, delay: 0.2, ease: 'power3.out' }
        );
      }
    };

      async handleCVUpload(input) {
        if (!input.files || !input.files[0]) return;

        const file = input.files[0];
        STATE.uploadedCV = file.name;

        // Only accept PDFs for now to avoid errors, or fallback for others based on your backend
        if (file.type !== 'application/pdf') {
          this.showErrorView('Invalid File', 'Currently, only PDF files are supported for extraction.');
          return;
        }

        const uploadZone = document.querySelector('.upload-zone');
        if (uploadZone) {
          const scanLine = document.createElement('div');
          scanLine.className = 'scanning-line';
          uploadZone.appendChild(scanLine);

          await new Promise(resolve => {
            gsap.fromTo(scanLine, 
              { y: 0, opacity: 1 }, 
              { y: uploadZone.offsetHeight, duration: 1, repeat: 1, ease: 'linear', onComplete: resolve }
            );
          });
          scanLine.remove();
        }

        this.showView('loading');

        try {
          // Read file as ArrayBuffer
          const arrayBuffer = await file.arrayBuffer();

          // Load PDF using PDF.js
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          let extractedText = "";

          // Iterate through each page to extract text
          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            const pageText = textContent.items.map(item => item.str).join(" ");
            extractedText += pageText + "\n";
          }

          if (!extractedText.trim()) {
            throw new Error("Could not extract any text from the PDF. It might be an image-based PDF.");
          }

          // Pass the real extracted text to the backend
          await this._processAnalysis({
            target_role: STATE.targetRole || "Mechatronics Technician",
            mode: "cv",
            cv_text: extractedText,
            answers: []
          });

        } catch (error) {
          console.error('PDF Extraction Error:', error);
          this.showErrorView('Extraction Failed', error.message || 'Failed to read the PDF file.');
        }
      },

          const response = await fetch(CONFIG.API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            // Provide specific details if the backend returns them (e.g., "Unknown target_role")
            throw new Error(errorData.detail || `Server error: ${response.status}`);
          }

          const data = await response.json();

          // Exactly map the Python backend response keys to our internal state
          STATE.matchPercentage = data.match_percentage || 0;
          STATE.skills = data.extracted_skills || [];
          STATE.gaps = data.skill_gaps || [];
          STATE.recommendations = data.recommendations || [];
          STATE.analysisResult = data;

          this.showView('options');

        } catch (error) {
          console.error('Analysis Failed:', error);
          // Distinguish between connectivity errors and backend processing errors
          const isConnectivity = error.message.includes('fetch') || error.message.includes('NetworkError');
          const title = isConnectivity ? 'Connection Failure' : 'Analysis Error';
          const msg = isConnectivity
            ? 'Could not connect to the AI engine. Please check your internet or the server status.'
            : (error.message || 'The AI engine rejected the data format or target role.');

          this.showErrorView(title, msg);
        }
