<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>inRebus Edu — AI Career Intelligence</title>
  <meta name="description" content="AI-powered career intelligence platform. Discover your skill gaps and get a personalized learning path to land your dream role.">

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap">
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- GSAP + Plugins -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="app-container">

  <!-- Particle Canvas -->
  <canvas id="particle-canvas"></canvas>

  <!-- Custom Cursor -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursor-follower"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo" id="logo-btn">
        <div class="logo-mark">in</div>
        <span class="logo-wordmark">Rebus</span>
        <span class="logo-tag">Edu</span>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav"></nav>

    <div class="sidebar-footer">
      <div class="user-pill" id="user-pill">
        <div class="avatar">JR</div>
        <div class="user-info">
          <p class="user-name">John Rossi</p>
          <p class="user-label">Learner Account</p>
        </div>
        <i data-lucide="chevron-right" style="width:14px;height:14px;color:var(--text-muted);margin-left:auto;"></i>
      </div>
    </div>
  </aside>

  <!-- Sidebar overlay (for mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Main Content -->
  <main class="main-wrapper">
    <header class="top-header">
      <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle menu">
        <i data-lucide="menu" style="width:16px;height:16px;"></i>
      </button>
      <h1 id="header-title">Career Goal</h1>
      <div id="header-action-area" style="display:flex;align-items:center;gap:0.625rem;"></div>

      <div class="header-static-actions" style="display:flex;align-items:center;gap:0.75rem;margin-left:0.5rem;">
        <!-- Theme toggle pill — moved outside dynamic area -->
        <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme">
          <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <span id="theme-label">Dark</span>
        </button>
      </div>
    </header>

    <div class="content-area" id="main-content"></div>
  </main>

  <!-- Hidden SVG for gradients -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="progress-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#ea580c"/>
        <stop offset="100%" style="stop-color:#fb923c"/>
      </linearGradient>
    </defs>
  </svg>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/vitanuova.js"></script>
</body>
</html>
